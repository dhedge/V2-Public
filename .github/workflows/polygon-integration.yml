name: Polygon Integration Tests
on: [push]

jobs:
  polygon-integration1:
    if: "contains(join(github.event.commits.*.message), '[run-polygon]') || contains(join(github.event.commits.*.message), '[run-integration]') || contains(github.event.ref, 'master')"
    name: PIT 1
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2
      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Node module cache
        uses: actions/cache@v2
        id: node-cache
        with:
          path: "**/node_modules"
          key: npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-
      - name: Install dependencies
        run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - name: Hardhat artifact cache
        uses: actions/cache@v2
        id: hardhat-cache
        with:
          path: "artifacts"
          key: artifacts-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            artifacts-

      - name: Run Polygon Fork in background
        env:
          ALCHEMY_URL: ${{ secrets.POLYGON_ALCHEMY_URL_INTEGRATION_TEST }}
        run: |
          npx hardhat node --fork $ALCHEMY_URL > log-polygon-integration.log 2>&1 &

      - name: Hardhat compile TypeChain
        run: npx hardhat --config hardhat.config-compile.ts typechain

      - name: Hardhat compile
        run: npx hardhat compile
        # if: steps.hardhat-cache.outputs.cache-hit != 'true'

      # We run these separately because then it fails faster AND you can tell immediately which tests failed via github
      - name: AaveTests
        run: |
          npx hardhat test ./test/integration/polygon/AaveTest.ts --network localhost
      - name: Balancer Tests
        run: |
          npx hardhat test ./test/integration/polygon/BalancerTest.ts --network localhost
      - name: DHedgePoolAggregator Tests
        run: |
          npx hardhat test ./test/integration/polygon/DHedgePoolAggregatorTest.ts --network localhost
      - name: DhedgeSwap Tests
        run: |
          npx hardhat test ./test/integration/polygon/DhedgeSwapTest.ts --network localhost
      - name: EarlyExit Tests
        run: |
          npx hardhat test ./test/integration/polygon/EarlyExitTest.ts --network localhost
      - name: ETHCrossAggregatorTest Tests
        run: |
          npx hardhat test ./test/integration/polygon/ETHCrossAggregatorTest.ts --network localhost
      - name: LendingEnabledAssetGuard Tests
        run: |
          npx hardhat test ./test/integration/polygon/LendingEnabledAssetGuardTest.ts --network localhost

  # Polygon tests are current split in 3 because they use more than 10k matic together... its also faster
