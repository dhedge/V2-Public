name: Polygon IntegrationTest
on: [push]

jobs:
  polygon-aave-edge-case:
    if: "contains(join(github.event.commits.*.message), '[run-polygon]') || contains(join(github.event.commits.*.message), '[run-integration]') || contains(github.event.ref, 'master')"
    name: Polygon Aave Edge Cases
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2
      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Node module cache
        uses: actions/cache@v2
        id: node-cache
        with:
          path: "**/node_modules"
          key: npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-
      - name: Install dependencies
        run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - name: Hardhat artifact cache
        uses: actions/cache@v2
        id: hardhat-cache
        with:
          path: "artifacts"
          key: artifacts-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            artifacts-

      - name: Typechain Types Cache
        uses: actions/cache@v2
        id: typechain-cache
        with:
          path: "types"
          key: types-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            types-

      - name: Hardhat compile TypeChain
        run: npx hardhat --config hardhat.config-compile.ts typechain
        if: steps.typechain-cache.outputs.cache-hit != 'true'
      - name: Run Polygon Fork in background
        env:
          ALCHEMY_URL: ${{ secrets.POLYGON_ALCHEMY_URL_INTEGRATION_TEST }}
        run: |
          npx hardhat node --fork $ALCHEMY_URL > log-polygon-integration.log 2>&1 &

      - name: Hardhat compile
        run: npx hardhat compile
        if: steps.hardhat-cache.outputs.cache-hit != 'true'

      # The AaveV2TestWithWETH Casttest are extremely brittle and often fail in CI seperating them
      - name: AaveV2TestWithWETH
        run: |
          npx hardhat test ./test/integration/polygon/AaveV2TestWithWETH.ts --network localhost

  polygon-aave-tests:
    if: "contains(join(github.event.commits.*.message), '[run-polygon]') || contains(join(github.event.commits.*.message), '[run-integration]') || contains(github.event.ref, 'master')"
    name: Polygon AaveTest
    runs-on: ubuntu-latest

