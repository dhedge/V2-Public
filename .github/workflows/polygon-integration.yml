name: Polygon Integration Tests
on: [push]

jobs:
  polygon-integration1:
    if: "contains(join(github.event.commits.*.message), '[run-integration]') || contains(github.event.ref, 'master')"
    name: PIT 1
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2
      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Node module cache
        uses: actions/cache@v2
        id: node-cache
        with:
          path: '**/node_modules'
          key: npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-
      - name: Install dependencies
        run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - name: Hardhat artifact cache
        uses: actions/cache@v2
        id: hardhat-cache
        with:
          path: "artifacts"
          key: artifacts-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            artifacts-

      - name: Run Polygon Fork in background
        env:
          ALCHEMY_URL: ${{ secrets.POLYGON_ALCHEMY_URL_INTEGRATION_TEST }}
        run: |
          npx hardhat node --fork $ALCHEMY_URL &

      - name: Hardhat compile
        run: npx hardhat compile
        if: steps.hardhat-cache.outputs.cache-hit != 'true'

      # We run these separately because then it fails faster AND you can tell immediately which tests failed via github
      - name: AaveEdgeCase Tests
        run: |
          npx hardhat test ./test/integration/polygon/AaveEdgeCaseTest.js --network localhost
      - name: AaveTests
        run: |
          npx hardhat test ./test/integration/polygon/AaveTest.js --network localhost
      - name: Balancer Tests
        run: |
          npx hardhat test ./test/integration/polygon/BalancerTest.js --network localhost
      - name: Balancer Tests
        run: |
          npx hardhat test ./test/integration/polygon/BalancerTest.js --network localhost
      - name: DHedgePoolAggregator Tests
        run: |
          npx hardhat test ./test/integration/polygon/DHedgePoolAggregatorTest.js --network localhost
      - name: DhedgeSwap Tests
        run: |
          npx hardhat test ./test/integration/polygon/DhedgeSwapTest.js --network localhost
      - name: EarlyExit Tests
        run: |
          npx hardhat test ./test/integration/polygon/EarlyExitTest.js --network localhost
      - name: ETHCrossAggregatorTest Tests
        run: |
          npx hardhat test ./test/integration/polygon/ETHCrossAggregatorTest.js --network localhost
      - name: LendingEnabledAssetGuard Tests
        run: |
          npx hardhat test ./test/integration/polygon/LendingEnabledAssetGuardTest.ts --network localhost

  # Polygon tests are current split in 2 because they use more than 10k matic together... its also faster
  polygon-integration2:
    if: "contains(join(github.event.commits.*.message), '[run-integration]') || contains(github.event.ref, 'master')"
    name: PIT 2
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2
      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Node module cache
        uses: actions/cache@v2
        id: node-cache
        with:
          path: '**/node_modules'
          key: npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-
      - name: Install dependencies
        run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - name: Hardhat artifact cache
        uses: actions/cache@v2
        id: hardhat-cache
        with:
          path: "artifacts"
          key: artifacts-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            artifacts-

      - name: Run Polygon Fork in background
        env:
          ALCHEMY_URL: ${{ secrets.POLYGON_ALCHEMY_URL_INTEGRATION_TEST }}
        run: |
          npx hardhat node --fork $ALCHEMY_URL &

      - name: Hardhat compile
        run: npx hardhat compile
        if: steps.hardhat-cache.outputs.cache-hit != 'true'

      # We run these separately because then it fails faster AND you can tell immediately which tests failed via github

      - name: OneInch Tests
        run: |
          npx hardhat test ./test/integration/polygon/OneInchTest.js --network localhost
      - name: PoolPerformance Tests
        run: |
          npx hardhat test ./test/integration/polygon/PoolPerformanceTest.js --network localhost
      - name: Quickswap Tests
        run: |
          npx hardhat test ./test/integration/polygon/QuickswapTest.js --network localhost
      - name: Sushiswap Tests
        run: |
          npx hardhat test ./test/integration/polygon/SushiswapTest.js --network localhost
      - name: WithdrawSingle Tests
        run: |
          npx hardhat test ./test/integration/polygon/WithdrawSingleTest.js --network localhost
