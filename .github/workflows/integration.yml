name: Integration Tests
on:
  push:
    branches:
    - '*'
    - '*/*'
    - '*/*/*'
    - '*/*/*/*'
    - '*/*/*/*/*'
    - '!master'

jobs:
  format:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, ‘[run-integration]’)

# This workflow contains a single job called "test"
  test:
    timeout-minutes: 10
    name: "Run Test"
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repository
        uses: actions/checkout@v2
      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Node module cache
        uses: actions/cache@v2
        id: node-cache
        with:
          path: '**/node_modules'
          key: npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-v2-
      - name: Install dependencies
        run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - name: Hardhat artifact cache
        uses: actions/cache@v2
        id: hardhat-cache
        with:
          path: "artifacts"
          key: artifacts-${{ hashFiles('contracts/**/*.sol') }}
          restore-keys: |
            artifacts-
      - name: Hardhat compile
        run: npx hardhat compile
        if: steps.hardhat-cache.outputs.cache-hit != 'true'

      - name: Run API in background
        run: |
          npm run fork:polygon &
        env:
          PORT: 4000

      - name: PoolPerformanceTest
        run: |
          npx hardhat test ./test/integration/polygon/PoolPerformanceTest.js --network localhost

      - name: AaveTest
        run: |
          npx hardhat test ./test/integration/polygon/AaveTest.js --network localhost

      - name: AaveEdgeCaseTest
        run: |
          npx hardhat test ./test/integration/polygon/AaveEdgeCaseTest.js --network localhost

      - name: BalancerTest
        run: |
          npx hardhat test ./test/integration/polygon/BalancerTest.js --network localhost

